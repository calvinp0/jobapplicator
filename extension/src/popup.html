<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Capture this job</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 360px;
        margin: 0;
        padding: 12px 14px;
        font-size: 13px;
        color: #1f2328;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px 0;
      }
      button {
        font: inherit;
        padding: 6px 10px;
        cursor: pointer;
      }
      .row {
        margin-bottom: 6px;
      }
      .label {
        color: #57606a;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .label.ok {
        color: #1a7f37;
      }
      .label.err {
        color: #cf222e;
      }
      .value {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .status {
        margin-top: 10px;
        padding: 6px 8px;
        border-radius: 4px;
      }
      .status.ok {
        background: #dafbe1;
        color: #1a7f37;
      }
      .status.err {
        background: #ffebe9;
        color: #cf222e;
      }
      #job-link,
      #frontend-link {
        display: inline-block;
        margin-top: 8px;
        color: #0969da;
        text-decoration: none;
        font-weight: 600;
      }
      #job-link:hover,
      #frontend-link:hover {
        text-decoration: underline;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      pre {
        background: #f6f8fa;
        padding: 6px;
        border-radius: 4px;
        max-height: 120px;
        overflow: auto;
      }
      .backend-row {
        margin-top: 6px;
        font-size: 11px;
        color: #57606a;
      }
      .backend-row a {
        color: #0969da;
        margin-left: 6px;
      }
      .backend-row .health {
        margin-left: 6px;
        font-weight: 600;
      }
      .backend-row .health.ok {
        color: #1a7f37;
      }
      .backend-row .health.err {
        color: #cf222e;
      }
    </style>
  </head>
  <body>
    <h1>Capture this job page</h1>
    <div class="actions">
      <button id="capture-btn">Capture this job page</button>
      <button id="send-btn" disabled>Send to backend</button>
    </div>
    <div class="backend-row">
      Backend URL: <span id="backend-url">…</span>
      <span id="backend-health" class="health"></span>
      <a href="#" id="options-link">Configure</a>
    </div>
    <div id="status" class="status" hidden></div>
    <a id="job-link" target="_blank" rel="noopener noreferrer" hidden></a>
    <a id="frontend-link" target="_blank" rel="noopener noreferrer">Open JobApplicator</a>
    <div id="preview" hidden>
      <div class="row"><span class="label">Title</span><div class="value" id="f-title"></div></div>
      <div class="row"><span class="label">Company</span><div class="value" id="f-company"></div></div>
      <div class="row"><span class="label">Location</span><div class="value" id="f-location"></div></div>
      <div class="row"><span class="label">Apply</span><div class="value" id="f-apply"></div></div>
      <div class="row"><span class="label">URL</span><div class="value" id="f-url"></div></div>
      <div class="row"><span class="label" id="f-desc-label">Description</span><pre id="f-desc"></pre></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
