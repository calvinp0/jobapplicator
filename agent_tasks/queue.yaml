# Agent task queue.
#
# This file is read by scripts/agentctl.sh.
# See docs/contracts/agent_orchestration.md for the field contract
# and status semantics.

tasks:
  - id: "001-scaffold"
    title: "Normalize project scaffold"
    file: "agent_tasks/001-scaffold-project.md"
    branch: "main"
    worktree: "main"
    status: "done"
    depends_on: []
    verification:
      - "tree -a -I '.git|__pycache__|node_modules'"
    allowed_paths:
      - "**"

  - id: "002-backend-models"
    title: "Add backend models and capture API"
    file: "agent_tasks/002-backend-models-and-capture-api.md"
    branch: "main"
    worktree: "main"
    status: "done"
    depends_on:
      - "001-scaffold"
    verification:
      - "pytest"
    allowed_paths:
      - "backend/**"
      - "docs/contracts/api_capture_payload.md"
      - "agent_tasks/queue.yaml"

  - id: "003-agent-orchestration"
    title: "Add agent orchestration harness"
    file: "agent_tasks/003-agent-orchestration-harness.md"
    branch: "agent/003-agent-orchestration"
    worktree: "agent-003-agent-orchestration"
    status: "done"
    depends_on:
      - "002-backend-models"
    verification:
      - "bash -n scripts/agentctl.sh"
      - "scripts/agentctl.sh list"
      - "scripts/agentctl.sh status"
    allowed_paths:
      - "scripts/**"
      - "agent_tasks/queue.yaml"
      - "docs/contracts/agent_orchestration.md"
      - "agent_tasks/003-agent-orchestration-harness.md"

  - id: "004-create-implementation-task-pack"
    title: "Create implementation task pack"
    file: "agent_tasks/004-create-implementation-task-pack.md"
    branch: "main"
    worktree: "main"
    status: "done"
    depends_on:
      - "003-agent-orchestration"
    verification:
      - "scripts/agentctl.sh list"
      - "scripts/agentctl.sh status"
      - "ls agent_tasks/"
    allowed_paths:
      - "agent_tasks/**"

  - id: "005-extension-capture"
    title: "Add browser extension current-page capture"
    file: "agent_tasks/005-extension-capture.md"
    branch: "agent/005-extension-capture"
    worktree: "agent-005-extension-capture"
    status: "done"
    depends_on:
      - "002-backend-models"
      - "003-agent-orchestration"
    verification:
      - "npm test"
      - "npm run build"
    allowed_paths:
      - "extension/**"
      - "docs/contracts/browser_extension_capture.md"
      - "agent_tasks/queue.yaml"

  - id: "006-run-directory-writer"
    title: "Add Claude run directory writer"
    file: "agent_tasks/006-run-directory-writer.md"
    branch: "agent/006-run-directory-writer"
    worktree: "agent-006-run-directory-writer"
    status: "done"
    depends_on:
      - "002-backend-models"
      - "003-agent-orchestration"
    verification:
      - "pytest"
    allowed_paths:
      - "backend/**"
      - "agent_tasks/queue.yaml"

  - id: "007-claude-code-worker"
    title: "Add Claude Code worker invocation"
    file: "agent_tasks/007-claude-code-worker.md"
    branch: "agent/007-claude-code-worker"
    worktree: "agent-007-claude-code-worker"
    status: "done"
    depends_on:
      - "006-run-directory-writer"
    verification:
      - "pytest"
    allowed_paths:
      - "backend/**"
      - "agent_tasks/queue.yaml"

  - id: "008-resume-version-import"
    title: "Add resume version import and approval"
    file: "agent_tasks/008-resume-version-import.md"
    branch: "agent/008-resume-version-import"
    worktree: "agent-008-resume-version-import"
    status: "done"
    depends_on:
      - "007-claude-code-worker"
    verification:
      - "pytest"
    allowed_paths:
      - "backend/**"
      - "agent_tasks/queue.yaml"

  - id: "009-frontend-shell"
    title: "Add frontend shell"
    file: "agent_tasks/009-frontend-shell.md"
    branch: "agent/009-frontend-shell"
    worktree: "agent-009-frontend-shell"
    status: "done"
    depends_on:
      - "003-agent-orchestration"
    verification:
      - "npm test"
      - "npm run build"
    allowed_paths:
      - "frontend/**"
      - "agent_tasks/queue.yaml"

  - id: "010-frontend-job-capture-flow"
    title: "Add frontend job capture flow"
    file: "agent_tasks/010-frontend-job-capture-flow.md"
    branch: "agent/010-frontend-job-capture-flow"
    worktree: "agent-010-frontend-job-capture-flow"
    status: "done"
    depends_on:
      - "005-extension-capture"
      - "009-frontend-shell"
    verification:
      - "npm test"
      - "npm run build"
    allowed_paths:
      - "frontend/**"
      - "agent_tasks/queue.yaml"

  - id: "011-eval-harness"
    title: "Add evaluation harness"
    file: "agent_tasks/011-eval-harness.md"
    branch: "agent/011-eval-harness"
    worktree: "agent-011-eval-harness"
    status: "done"
    depends_on:
      - "006-run-directory-writer"
    verification:
      - "pytest"
    allowed_paths:
      - "evals/**"
      - "agent_tasks/queue.yaml"

  - id: "012-agent-orchestration-automation"
    title: "Improve agent orchestration automation"
    file: "agent_tasks/012-improve-agent-orchestration.md"
    branch: "agent/012-agent-orchestration-automation"
    worktree: "agent-012-agent-orchestration-automation"
    status: "done"
    depends_on:
      - "003-agent-orchestration"
    verification:
      - "bash -n scripts/agentctl.sh"
      - "scripts/agentctl.sh list"
      - "scripts/agentctl.sh status"
      - "scripts/agentctl.sh ready"
    allowed_paths:
      - "scripts/**"
      - "docs/contracts/agent_orchestration.md"
      - "agent_tasks/queue.yaml"
      - "agent_tasks/012-improve-agent-orchestration.md"

  - id: "013-agent-planner"
    title: "Add agent planner command"
    file: "agent_tasks/013-agent-planner.md"
    branch: "agent/013-agent-planner"
    worktree: "agent-013-agent-planner"
    status: "done"
    depends_on:
      - "012-agent-orchestration-automation"
    verification:
      - "bash -n scripts/agentctl.sh"
      - "scripts/agentctl.sh list"
      - "scripts/agentctl.sh status"
      - "scripts/agentctl.sh ready"
      - "scripts/agentctl.sh plan --help"
    allowed_paths:
      - "scripts/**"
      - "docs/contracts/agent_orchestration.md"
      - "agent_tasks/**"
      - ".agent_plans/**"
      - ".gitignore"
